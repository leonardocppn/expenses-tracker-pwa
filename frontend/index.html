<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Life Tracker</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<nav>
  <button class="active" data-page="add">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
    </svg>
    Add
  </button>
  <button data-page="sleep">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    Sleep
  </button>
  <button data-page="mood">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    Mood
  </button>
  <button data-page="stats">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    Stats
  </button>
</nav>

<main>

  <!-- ADD EXPENSE -->
  <div id="add" class="page active">

    <!-- Quick mood -->
    <div class="quick-mood">
      <button type="button" class="mood-btn quick-btn" data-val="1"></button>
      <button type="button" class="mood-btn quick-btn" data-val="2"></button>
      <button type="button" class="mood-btn quick-btn" data-val="3"></button>
      <button type="button" class="mood-btn quick-btn" data-val="4"></button>
    </div>

    <form id="form-expense">

      <div class="form-group">
        <div class="macro-toggle">
          <button type="button" class="macro-btn active" data-val="essential">Essential</button>
          <button type="button" class="macro-btn" data-val="leisure">Leisure</button>
          <button type="button" class="macro-btn" data-val="other">Other</button>
        </div>
      </div>

      <div class="form-group">
        <select id="f-category"></select>
      </div>

      <div class="form-group">
        <div class="amount-row">
          <input id="f-amount" type="text" inputmode="decimal" placeholder="€" required />
          <button type="button" id="preset-btn" class="date-icon-btn" style="font-size:20px">💸</button>
          <button type="button" id="date-toggle-btn" class="date-icon-btn">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="20" height="20">
              <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
          </button>
        </div>
        <input id="f-date" type="date" class="date-hidden" required />
      </div>

      <div class="form-group">
        <textarea id="f-note" placeholder="Description..."></textarea>
      </div>

      <button type="submit" class="btn">Save expense</button>
    </form>

    <div class="list-header" style="margin-top:24px">
      <h2>Expenses</h2>
      <button type="button" id="filter-toggle" class="filter-toggle-btn">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="18" height="18">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
        Filter
      </button>
    </div>

    <div id="filter-panel" class="filter-panel hidden">
      <div class="filter-row">
        <span class="filter-label">Period</span>
        <div class="filter-chips">
          <button class="chip" data-period="all">All</button>
          <button class="chip active" data-period="today">Today</button>
          <button class="chip" data-period="week">Week</button>
          <button class="chip" data-period="month">Month</button>
        </div>
      </div>
      <div class="filter-row">
        <span class="filter-label">Macro</span>
        <div class="filter-chips">
          <button class="chip active" data-macro="all">All</button>
          <button class="chip" data-macro="essential">Essential</button>
          <button class="chip" data-macro="leisure">Leisure</button>
          <button class="chip" data-macro="other">Other</button>
        </div>
      </div>
    </div>

    <div id="expense-list"></div>
  </div>

  <!-- SLEEP -->
  <div id="sleep" class="page">
    <div id="sleep-state"></div>
    <div id="sleep-chart-wrap"></div>
    <div id="sleep-list"></div>
  </div>

  <!-- MOOD CALENDAR -->
  <div id="mood" class="page">
    <div class="cal-page-header">
      <h2>Mood Calendar</h2>
      <button type="button" id="cal-view-toggle" class="btn-sm">Yearly</button>
    </div>
    <div id="cal-wrap"></div>
  </div>

  <!-- STATS -->
  <div id="stats" class="page">
    <h2>Statistics</h2>
    <div id="stats-content"></div>
  </div>

</main>

<!-- Mood popup (calendar) -->
<div id="mood-popup" class="popup-overlay">
  <div class="popup-card">
    <div class="popup-date" id="popup-date"></div>
    <div class="mood-scale">
      <button type="button" class="mood-btn popup-emoji-btn" data-val="1"></button>
      <button type="button" class="mood-btn popup-emoji-btn" data-val="2"></button>
      <button type="button" class="mood-btn popup-emoji-btn" data-val="3"></button>
      <button type="button" class="mood-btn popup-emoji-btn" data-val="4"></button>
    </div>
    <button id="popup-remove" class="btn-sm" style="margin-top:4px;width:100%;text-align:center;border-color:var(--red);color:var(--red);display:none">Remove mood</button>
    <button id="popup-close" class="btn-sm" style="margin-top:8px;width:100%;text-align:center">Cancel</button>
  </div>
</div>

<!-- Preset expenses popup -->
<div id="preset-popup" class="popup-overlay">
  <div class="popup-card">
    <div class="preset-options">
      <button class="preset-btn" data-amount="9.99" data-macro="essential" data-cat="subscriptions">Streaming<span class="preset-price">9.99 €</span></button>
      <button class="preset-btn" data-amount="4.99" data-macro="essential" data-cat="subscriptions">Music<span class="preset-price">4.99 €</span></button>
      <button class="preset-btn" data-amount="2.99" data-macro="essential" data-cat="subscriptions">Cloud Storage<span class="preset-price">2.99 €</span></button>
      <button class="preset-btn" data-amount="30.00" data-macro="essential" data-cat="transport">Monthly Pass<span class="preset-price">30.00 €</span></button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
